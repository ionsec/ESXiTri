site_name: ESXiTri Documentation
site_description: ESXiTri - Modern ESXi Incident Response Artifact Collection
site_author: IONSEC Incident Response Team
copyright: Copyright &copy; IONSEC Incident Response Team
repo_url: https://github.com/ionsec/ESXiTri
repo_name: ionsec/ESXiTri

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Usage: usage.md
  - Artifacts: ARTIFACTS.md
  - Compatibility: COMPATIBILITY.md
  - Dashboard: DASHBOARD.md
  - Changelog: changelog.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ionsec/ESXiTri
  generator: false
